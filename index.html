<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posture Guard Pro v3.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@400;700&display=swap');
        :root {
            --bg: #05080f; --panel: #0a0f1e; --border: #1a2540; --accent: #00e5ff;
            --accent2: #ff3d71; --ok: #00e676; --text: #c8d8f0; --dim: #3a4a6a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Chakra Petch', sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
        .full-width { grid-column: 1 / -1; }
        
        .label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; font-family: 'Share Tech Mono'; margin-bottom: 10px; }
        #angle-val { font-size: 6rem; font-weight: 700; font-family: 'Share Tech Mono'; color: var(--ok); line-height: 1; }
        .danger { color: var(--accent2) !important; text-shadow: 0 0 20px rgba(255, 61, 113, 0.5); }
        
        /* สถิติรายวัน */
        .stat-big { font-size: 4rem; font-family: 'Share Tech Mono'; color: var(--accent); }
        
        button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: rgba(0,229,255,0.1); box-shadow: 0 0 15px var(--accent); }
        
        canvas { width: 100%; height: 150px; margin-top: 10px; }
        #log { height: 80px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.7rem; font-family: 'Share Tech Mono'; color: #4ade80; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="color:var(--accent); font-size: 1.8rem;">POSTURE GUARD PRO</h1>
            <p style="font-size: 0.7rem; color: var(--dim);">SYSTEM STATUS: <span id="sys-status">OFFLINE</span></p>
        </div>
        <button id="btn-connect">⚡ CONNECT DEVICE</button>
    </header>

    <div class="grid">
        <div class="panel">
            <div class="label">// Real-time Tilt Angle</div>
            <div style="display: flex; align-items: baseline; gap: 10px;">
                <span id="angle-val">0.0</span><span style="font-size: 2rem; color: var(--dim);">°</span>
            </div>
            <div style="height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin-top: 15px;">
                <div id="bar-fill" style="height: 100%; width: 0%; background: var(--accent); transition: width 0.1s;"></div>
            </div>
        </div>

        <div class="panel">
            <div class="label">// Daily Alert Summary</div>
            <div style="text-align: center;">
                <div id="daily-vibe-count" class="stat-big">0</div>
                <div style="font-size: 0.8rem; color: var(--dim);">TOTAL ALERTS TODAY</div>
            </div>
            <div style="font-size: 0.7rem; color: var(--dim); margin-top: 10px; text-align: center;" id="last-reset">Last reset: --/--/--</div>
        </div>

        <div class="panel full-width">
            <div class="label">// Live Movement Graph</div>
            <canvas id="tilt-graph"></canvas>
        </div>

        <div class="panel full-width">
            <div class="label">// System Log</div>
            <div id="log">Waiting for user interaction...</div>
        </div>
    </div>
</div>

<script>
    let port, reader, buffer = "";
    const history = [];
    const threshold = 45.0;
    
    // ตัวแปรสำหรับนับการสั่นรายวัน
    let dailyCount = parseInt(localStorage.getItem('posture_dailyCount')) || 0;
    let lastDate = localStorage.getItem('posture_lastDate') || "";
    let isVibrating = false; // กันการนับซ้ำถ้านั่งงอค้างไว้

    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        document.getElementById('log').innerHTML += `<div>[${time}] ${msg}</div>`;
        document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
    }

    // ระบบเช็กวันใหม่เพื่อ Reset ค่า
    function checkNewDay() {
        const today = new Date().toLocaleDateString();
        if (lastDate !== today) {
            dailyCount = 0;
            lastDate = today;
            localStorage.setItem('posture_dailyCount', 0);
            localStorage.setItem('posture_lastDate', today);
        }
        document.getElementById('daily-vibe-count').textContent = dailyCount;
        document.getElementById('last-reset').textContent = "Current Session: " + today;
    }

    checkNewDay();

    document.getElementById('btn-connect').onclick = async () => {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            
            document.getElementById('btn-connect').textContent = "✓ CONNECTED";
            document.getElementById('sys-status').textContent = "ONLINE";
            document.getElementById('sys-status').style.color = "var(--ok)";
            addLog("Bluetooth Connection Established.");

            const textDecoder = new TextDecoderStream();
            port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();
            
            readLoop();
        } catch (e) {
            addLog("Connection Error: " + e.message);
        }
    };

    async function readLoop() {
        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            
            buffer += value;
            let lines = buffer.split('\n');
            buffer = lines.pop();

            for (let line of lines) {
                let num = parseFloat(line.trim());
                if (!isNaN(num)) {
                    updateUI(num);
                }
            }
        }
    }

    function updateUI(angle) {
        angle = Math.abs(angle);
        
        // อัปเดตตัวเลขและแถบ Gauge
        const valEl = document.getElementById('angle-val');
        valEl.textContent = angle.toFixed(1);
        document.getElementById('bar-fill').style.width = Math.min(angle/90*100, 100) + "%";

        // ระบบนับจำนวนครั้งที่สั่น (นับเฉพาะตอนที่เปลี่ยนจาก "ดี" เป็น "งอ")
        if (angle >= threshold && !isVibrating) {
            dailyCount++;
            localStorage.setItem('posture_dailyCount', dailyCount);
            document.getElementById('daily-vibe-count').textContent = dailyCount;
            isVibrating = true; // ล็อคไว้จนกว่าจะกลับมาตัวตรง
            valEl.classList.add('danger');
        } else if (angle < threshold) {
            isVibrating = false; // ปลดล็อคเพื่อให้พร้อมนับครั้งใหม่
            valEl.classList.remove('danger');
        }

        // เก็บข้อมูลทำกราฟ
        history.push(angle);
        if (history.length > 100) history.shift();
        drawGraph();
    }

    function drawGraph() {
        const c = document.getElementById('tilt-graph');
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        
        ctx.strokeStyle = "#00e5ff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        let step = c.width / 100;
        
        history.forEach((v, i) => {
            let x = i * step;
            let y = c.height - (v / 90 * c.height);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }
</script>
</body>
</html>
