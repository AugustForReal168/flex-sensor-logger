<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posture Guard Pro v4.2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@400;700&display=swap');
        
        :root {
            /* [ม่วง] 60% - Background & Main Panels (#1B4332) */
            --bg-60: #1B4332; 
            
            /* [น้ำเงินในผัง] 30% - Secondary Details & Border (#EFE9AE) */
            --sec-30: #EFE9AE; 
            --text-dim: rgba(239, 233, 174, 0.7);

            /* [แดงในผัง] 10% - Critical Info & Buttons (#FA8072) */
            --accent-10: #FA8072; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg-60); 
            color: var(--sec-30); 
            font-family: 'Chakra Petch', sans-serif; 
            padding: 20px;
            min-height: 100vh;
        }

        /* ตาราง Grid พื้นหลัง */
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(239, 233, 174, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(239, 233, 174, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--sec-30); padding-bottom: 15px; margin-bottom: 25px; 
        }

        h1 { color: var(--accent-10); font-size: 1.8rem; letter-spacing: 2px; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .panel { 
            background: var(--bg-60); 
            border: 2px solid var(--sec-30); 
            border-radius: 15px; padding: 25px; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }

        .full-width { grid-column: 1 / -1; }

        .label { 
            font-family: 'Share Tech Mono'; font-size: 0.8rem; 
            color: var(--sec-30); opacity: 0.8; margin-bottom: 10px; 
            border-left: 4px solid var(--accent-10); padding-left: 10px;
        }

        /* [กรอบแดง] ตัวเลขและจุดเน้นสำคัญ */
        #angle-display, #daily-vibe-count { 
            font-family: 'Share Tech Mono'; 
            color: var(--accent-10); 
            font-weight: bold;
        }
        
        #angle-display { font-size: 6rem; line-height: 1; }
        #daily-vibe-count { font-size: 5rem; }

        /* [กรอบน้ำเงิน] รายละเอียดปลีกย่อย */
        .details { color: var(--sec-30); font-size: 0.9rem; margin-top: 5px; }

        /* ปุ่มกด (เน้นแดง) */
        button { 
            background: transparent; border: 2px solid var(--accent-10); 
            color: var(--accent-10); padding: 12px 30px; border-radius: 5px;
            cursor: pointer; font-family: 'Chakra Petch'; font-weight: bold;
            transition: 0.3s; width: 100%; margin-bottom: 20px;
        }
        button:hover { background: var(--accent-10); color: var(--bg-60); }

        #log-feed { 
            background: rgba(0,0,0,0.2); border: 1px solid var(--sec-30);
            height: 100px; overflow-y: auto; padding: 10px;
            font-family: 'Share Tech Mono'; font-size: 0.75rem; color: var(--text-dim);
        }

        canvas { width: 100%; height: 150px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>POSTURE GUARD <span style="font-size: 0.8rem; color: var(--sec-30);">v4.2</span></h1>
        <div style="text-align: right;">
            <div id="status-text" style="color: var(--sec-30);">STATUS: STANDBY</div>
        </div>
    </header>

    <button id="connect-btn">⚡ เชื่อมต่อบลูทูธ (9600 BAUD)</button>

    <div class="main-grid">
        <div class="panel">
            <div class="label">CURRENT TILT ANGLE</div>
            <div id="angle-display">0.0</div>
            <div class="details">DEGREES (Y-AXIS)</div>
        </div>

        <div class="panel">
            <div class="label">TOTAL ALERTS TODAY</div>
            <div id="daily-vibe-count">0</div>
            <div id="date-info" class="details">Session: --/--/--</div>
        </div>

        <div class="panel full-width">
            <div class="label">MOVEMENT HISTORY</div>
            <canvas id="tilt-graph"></canvas>
        </div>

        <div class="panel full-width">
            <div class="label">RAW DATA FEED</div>
            <div id="log-feed">รอการเชื่อมต่อ...</div>
        </div>
    </div>
</div>

<script>
    let port, reader, buffer = "";
    const history = [];
    let dailyCount = parseInt(localStorage.getItem('posture_dailyCount')) || 0;
    let lastDate = localStorage.getItem('posture_lastDate') || "";
    let isVibrating = false;

    const connectBtn = document.getElementById('connect-btn');
    const logFeed = document.getElementById('log-feed');

    function checkNewDay() {
        const today = new Date().toLocaleDateString();
        if (lastDate !== today) {
            dailyCount = 0;
            lastDate = today;
            localStorage.setItem('posture_dailyCount', 0);
            localStorage.setItem('posture_lastDate', today);
        }
        document.getElementById('daily-vibe-count').textContent = dailyCount;
        document.getElementById('date-info').textContent = "Current Session: " + today;
    }
    checkNewDay();

    connectBtn.onclick = async () => {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            connectBtn.style.display = 'none';
            document.getElementById('status-text').textContent = "STATUS: ONLINE";
            document.getElementById('status-text').style.color = "#FA8072";
            readLoop();
        } catch (e) { logFeed.innerHTML += `<div>Error: ${e.message}</div>`; }
    };

        const decoder = new TextDecoderStream();
