<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posture Guard Pro v4.0 (60-30-10)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@400;700&display=swap');
        
        /* สีกฎ 60 30 10 */
        :root {
            /* 60% สีหลัก (Background/Primary) */
            --bg: #1B4332; 
            --panel-bg: #1B4332; /* ใช้สีเดียวกับพื้นหลังเพื่อความกลมกลืน */
            --border: #EFE9AE;   /* ใช้สีรองเป็นขอบเพื่อให้เห็นแผงชัดขึ้น */

            /* 30% สีรอง (Text/Secondary) */
            --text: #EFE9AE; 
            --text-dim: rgba(239, 233, 174, 0.6); /* สีรองแบบโปร่งแสง */
            --graph-line: #EFE9AE; 

            /* 10% สีเน้น (Accent/Action) */
            --accent: #FA8072; 
            --accent-text: #FA8072; 
            --btn-hover: #EFE9AE; 
            --btn-hover-text: #1B4332;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Chakra Petch', sans-serif; 
            min-height: 100vh; overflow-x: hidden; padding: 20px;
        }

        /* Grid Background แบบ Cyberpunk (ใช้สีเน้นและสีรองแบบจางๆ) */
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(250, 128, 114, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(239, 233, 174, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1;
        }

        .container { max-width: 960px; margin: 0 auto; padding: 25px; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; 
        }

        .status-badge { 
            padding: 6px 15px; border-radius: 20px; border: 1px solid var(--border); 
            font-size: 0.8rem; font-family: 'Share Tech Mono'; transition: all 0.3s;
        }

        .connected { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px rgba(250, 128, 114, 0.3); }
        .danger-mode { border-color: var(--accent); color: var(--accent); animation: pulse 0.6s infinite alternate; }

        @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .panel { background: var(--panel-bg); border: 2px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
        .full-width { grid-column: 1 / -1; }
        .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; font-family: 'Share Tech Mono'; letter-spacing: 1.5px; }

        /* Big Angle Display */
        #angle-display { font-size: 7rem; font-weight: 700; font-family: 'Share Tech Mono'; line-height: 1; color: var(--text); }
        #angle-display.danger { color: var(--accent); text-shadow: 0 0 20px rgba(250, 128, 114, 0.5); }

        .progress-container { height: 12px; background: rgba(239, 233, 174, 0.2); border-radius: 6px; overflow: hidden; margin-top: 15px; }
        #progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.1s; }

        /* สถิติรายวัน */
        .stat-big { font-size: 4rem; font-family: 'Share Tech Mono'; color: var(--accent); text-shadow: 0 0 10px rgba(250, 128, 114, 0.3); }

        /* Control & Log */
        button { 
            background: transparent; border: 2px solid var(--accent); color: var(--accent); 
            padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Chakra Petch';
            transition: all 0.3s; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { background: var(--btn-hover); color: var(--btn-hover-text); box-shadow: 0 0 20px rgba(239, 233, 174, 0.5); }
        button:disabled { border-color: var(--text-dim); color: var(--text-dim); cursor: not-allowed; }

        #log-window { 
            height: 100px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; 
            padding: 10px; font-family: 'Share Tech Mono'; font-size: 0.75rem; color: var(--text-dim); margin-top: 10px;
        }

        canvas { width: 100%; height: 140px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="color:var(--accent); letter-spacing: 2px; font-size: 2rem;">POSTURE GUARD <span style="font-size: 0.9rem; vertical-align: middle; color:var(--text); opacity:0.7;">v4.0</span></h1>
            <p style="font-size:0.7rem; color:var(--text-dim)">SYSTEM STATUS: <span id="sys-status">OFFLINE</span> | BLUETOOTH SERIAL (9600)</p>
        </div>
        <div id="status" class="status-badge">STANDBY</div>
    </header>

    <div style="margin-bottom: 25px; text-align: center;">
        <button id="connect-btn">⚡ เชื่อมต่อบลูทูธ (9600 BAUD)</button>
    </div>

    <div class="main-grid">
        <div class="panel">
            <div class="label">// Current Tilt Angle</div>
            <div style="display:flex; align-items: baseline; gap:20px;">
                <span id="angle-display">0.0</span><span style="font-size:2rem; color:var(--text-dim)">°</span>
            </div>
            <div class="progress-container"><div id="progress-fill"></div></div>
        </div>

        <div class="panel">
            <div class="label">// Daily Alert Summary</div>
            <div style="text-align: center;">
                <div id="daily-vibe-count" class="stat-big">0</div>
                <div style="font-size: 0.8rem; color: var(--text-dim);">TOTAL ALERTS TODAY</div>
            </div>
            <div style="font-size: 0.7rem; color: var(--text-dim); margin-top: 10px; text-align: center;" id="last-reset">Last reset: --/--/--</div>
        </div>

        <div class="panel full-width">
            <div class="label">// Real-time Tilt History</div>
            <canvas id="tilt-graph"></canvas>
        </div>

        <div class="panel full-width">
            <div class="label">// Raw Data Feed</div>
            <div id="log-window">รอการเชื่อมต่อจาก Arduino...</div>
        </div>
    </div>
</div>

<script>
    let port, reader, buffer = "";
    const history = [];
    const threshold = 45.0; // องศาที่ตั้งไว้

    // ตัวแปรสำหรับนับการสั่นรายวัน
    let dailyCount = parseInt(localStorage.getItem('posture_dailyCount')) || 0;
    let lastDate = localStorage.getItem('posture_lastDate') || "";
    let isVibrating = false; // กันการนับซ้ำถ้านั่งงอค้างไว้

    const connectBtn = document.getElementById('connect-btn');
    const logWindow = document.getElementById('log-window');

    function log(msg, isError = false) {
        const time = new Date().toLocaleTimeString();
        const style = isError ? 'color: #FA8072;' : '';
        logWindow.innerHTML += `<div style="${style}">[${time}] ${msg}</div>`;
        logWindow.scrollTop = logWindow.scrollHeight;
    }

    // ระบบเช็กวันใหม่เพื่อ Reset ค่า
    function checkNewDay() {
        const today = new Date().toLocaleDateString();
        if (lastDate !== today) {
            dailyCount = 0;
            lastDate = today;
            localStorage.setItem('posture_dailyCount', 0);
            localStorage.setItem('posture_lastDate', today);
        }
        document.getElementById('daily-vibe-count').textContent = dailyCount;
        document.getElementById('last-reset').textContent = "Current Session: " + today;
    }

    checkNewDay();

    connectBtn.onclick = async () => {
        if (!navigator.serial) {
            alert("เบราว์เซอร์นี้ไม่รองรับ Web Serial API (กรุณาใช้ Chrome บน PC)");
            return;
        }

        try {
            log("กำลังขออนุญาตเข้าถึง Serial Port...");
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            
            log("เชื่อมต่อสำเร็จ! กำลังรอข้อมูล...");
            connectBtn.disabled = true;
            connectBtn.textContent = "✓ DEVICE ACTIVE";
            document.getElementById('status').textContent = "ONLINE";
            document.getElementById('sys-status').textContent = "ONLINE";
            document.getElementById('sys-status').style.color = "var(--accent)";
            document.getElementById('status').classList.add('connected');

            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            reader = decoder.readable.getReader();
            
            readLoop();
        } catch (err) {
            log("ERROR: " + err.message, true);
        }
    };

    async function readLoop() {
        while (true) {
            try {
                const { value, done } = await reader.read();
                if (done) {
                    log("ตัดการเชื่อมต่อแล้ว");
                    break;
                }
                
                buffer += value;
                let lines = buffer.split('\n');
                buffer = lines.pop(); // เก็บส่วนที่ยังไม่จบบรรทัดไว้
                
                for (let line of lines) {
                    let cleanData = line.trim();
                    if (cleanData.length > 0) {
                        let angle = parseFloat(cleanData);
                        if (!isNaN(angle)) {
                            updateUI(Math.abs(angle));
                        }
                    }
                }
            } catch (e) {
                log("READ ERROR: " + e.message, true);
                break;
            }
        }
    }

    function updateUI(angle) {
        // อัปเดตตัวเลขและแถบ Gauge
        const display = document.getElementById('angle-display');
        const fill = document.getElementById('progress-fill');
        const statusBadge = document.getElementById('status');
        
        display.textContent = angle.toFixed(1);
        fill.style.width = Math.min((angle / 90) * 100, 100) + "%";

        // Logic การนับจำนวนครั้งที่สั่น (นับเฉพาะตอนที่เปลี่ยนจาก "ดี" เป็น "งอ")
        if (angle >= threshold && !isVibrating) {
            dailyCount++;
            localStorage.setItem('posture_dailyCount', dailyCount);
            document.getElementById('daily-vibe-count').textContent = dailyCount;
            isVibrating = true; // ล็อคไว้จนกว่าจะกลับมาตัวตรง

            display.classList.add('danger');
            fill.style.background = "var(--accent)";
            statusBadge.classList.add('danger-mode');
            statusBadge.textContent = "ALERT!";
        } else if (angle < threshold) {
            isVibrating = false; // ปลดล็อคเพื่อให้พร้อมนับครั้งใหม่
            display.classList.remove('danger');
            fill.style.background = "var(--text)"; // ใช้สีรองเมื่อปกติ
            statusBadge.classList.remove('danger-mode');
            statusBadge.textContent = "ONLINE";
        }

        // เก็บข้อมูลทำกราฟ
        history.push(angle);
        if (history.length > 100) history.shift();
        drawGraph();
    }

    function renderGraph() {
        const c = document.getElementById('tilt-graph');
        const ctx = c.getContext('2d');
        // อัปเดตขนาดแคนวาสให้เต็มแผงเสมอ
        c.width = c.parentElement.clientWidth - 40;
        c.height = 140;

        ctx.clearRect(0, 0, c.width, c.height);
        
        ctx.strokeStyle = "#EFE9AE"; // ใช้สีรอง (เหลืองนวล) เป็นเส้นกราฟ
        ctx.lineWidth = 3;
        ctx.lineJoin = "round";
        ctx.beginPath();
        
        const xStep = c.width / 100;
        history.forEach((v, i) => {
            const x = i * xStep;
            const y = c.height - (v / 90 * c.height);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    // ฟังก์ชันวาดกราฟแบบยืดหยุ่นตามขนาดแผง
    let drawGraph = renderGraph;
    window.addEventListener('resize', renderGraph);
</script>
</body>
</html>
