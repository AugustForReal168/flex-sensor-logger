<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posture Guard Pro v4.3</title>
    <style>
        /* 1. ดึงฟอนต์ "Chakra Petch" จาก Google Fonts และ "Share Tech Mono" */
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            /* [ม่วง] 60% - Background & Main Panels (#1B4332) */
            --bg-60: #1B4332; 
            
            /* [น้ำเงิน] 30% - Secondary Details & Border (#EFE9AE) */
            --sec-30: #EFE9AE; 
            --text-dim: rgba(239, 233, 174, 0.7);

            /* [แดง] 10% - Critical Info & Buttons (#FA8072) */
            --accent-10: #FA8072; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg-60); 
            /* 2. สั่งใช้ฟอนต์ Chakra Petch ทั้งหน้าเว็บ */
            font-family: 'Chakra Petch', sans-serif; 
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative; /* เพื่อให้พื้นหลังขยับได้ไม่กวนเนื้อหา */
        }

        /* --- 3. ตกแต่งพื้นหลังให้มีชีวิต --- */
        
        /* สร้างตาราง Grid (SVG) */
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(239, 233, 174, 0.08) 1.5px, transparent 1.5px), 
                              linear-gradient(90deg, rgba(239, 233, 174, 0.08) 1.5px, transparent 1.5px);
            background-size: 60px 60px; z-index: -1;
        }

        /* สร้าง "วงกลมเรืองแสง" (Glow) ที่ขยับได้ */
        body::after {
            content: ''; position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(250, 128, 114, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            top: 10%; left: 5%;
            filter: blur(50px);
            z-index: -2;
            /* เรียกใช้ Animation */
            animation: glow-move 15s infinite alternate ease-in-out;
        }

        /* สร้าง Glow วงที่ 2 (สีนวลๆ) */
        .glow-2 {
            content: ''; position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(239, 233, 174, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -10%; right: -10%;
            filter: blur(60px);
            z-index: -2;
            animation: glow-move-2 20s infinite alternate ease-in-out;
        }

        /* 4. กำหนดการขยับของ Glow */
        @keyframes glow-move {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(150px, 50px) scale(1.1); }
            100% { transform: translate(50px, -100px) scale(1.2); }
        }

        @keyframes glow-move-2 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-100px, -80px) scale(1.05); }
            100% { transform: translate(-30px, -20px) scale(1.1); }
        }

        /* --- เนื้อหาหลัก --- */

        .container { max-width: 900px; margin: 0 auto; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--sec-30); padding-bottom: 15px; margin-bottom: 25px; 
        }

        h1 { color: var(--accent-10); font-size: 1.8rem; letter-spacing: 2px; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .panel { 
            background: rgba(27, 67, 50, 0.8); /* โปร่งแสงนิดนึงเพื่อให้เห็น Glow ด้านหลัง */
            border: 2px solid var(--sec-30); 
            border-radius: 15px; padding: 25px; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px); /* ทำให้พื้นหลังเบลอ (Glassmorphism) */
        }

        .full-width { grid-column: 1 / -1; }

        .label { 
            font-family: 'Chakra Petch', sans-serif; /* เปลี่ยนมาใช้ Chakra Petch */
            font-size: 0.85rem; font-weight: bold;
            color: var(--sec-30); opacity: 0.8; margin-bottom: 10px; 
            border-left: 4px solid var(--accent-10); padding-left: 10px;
            text-transform: uppercase;
        }

        /* [กรอบแดง] ตัวเลขและจุดเน้นสำคัญ */
        #angle-display, #daily-vibe-count { 
            font-family: 'Share Tech Mono'; /* ตัวเลขยังใช้ Mono เพื่อความเป๊ะ */
            color: var(--accent-10); 
            font-weight: bold;
        }
        
        #angle-display { font-size: 6rem; line-height: 1; }
        #daily-vibe-count { font-size: 5rem; }

        /* [กรอบน้ำเงิน] รายละเอียดปลีกย่อย */
        .details { color: var(--sec-30); font-size: 0.95rem; margin-top: 5px; }

        /* ปุ่มกด (เน้นแดง) */
        button { 
            background: transparent; border: 2px solid var(--accent-10); 
            color: var(--accent-10); padding: 12px 30px; border-radius: 5px;
            cursor: pointer; font-family: 'Chakra Petch'; font-weight: bold;
            transition: 0.3s; width: 100%; margin-bottom: 20px;
            font-size: 1.1rem;
        }
        button:hover { background: var(--accent-10); color: var(--bg-60); }

        #log-feed { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--sec-30);
            height: 100px; overflow-y: auto; padding: 10px;
            font-family: 'Share Tech Mono'; font-size: 0.75rem; color: var(--text-dim);
        }

        canvas { width: 100%; height: 150px; }
    </style>
</head>
<body>

<div class="glow-2"></div>

<div class="container">
    <header>
        <h1>POSTURE GUARD <span style="font-size: 0.8rem; color: var(--sec-30);">v4.3</span></h1>
        <div style="text-align: right;">
            <div id="status-text" style="color: var(--sec-30); font-weight: bold;">STATUS: STANDBY</div>
        </div>
    </header>

    <button id="connect-btn">⚡ เชื่อมต่อบลูทูธ (9600 BAUD)</button>

    <div class="main-grid">
        <div class="panel">
            <div class="label">CURRENT TILT ANGLE</div>
            <div id="angle-display">0.0</div>
            <div class="details">DEGREES (Y-AXIS)</div>
        </div>

        <div class="panel">
            <div class="label">TOTAL ALERTS TODAY</div>
            <div id="daily-vibe-count">0</div>
            <div id="date-info" class="details">Session: --/--/--</div>
        </div>

        <div class="panel full-width">
            <div class="label">MOVEMENT HISTORY</div>
            <canvas id="tilt-graph"></canvas>
        </div>

        <div class="panel full-width">
            <div class="label">RAW DATA FEED</div>
            <div id="log-feed">รอการเชื่อมต่อ...</div>
        </div>
    </div>
</div>

<script>
    let port, reader, buffer = "";
    const history = [];
    let dailyCount = parseInt(localStorage.getItem('posture_dailyCount')) || 0;
    let lastDate = localStorage.getItem('posture_lastDate') || "";
    let isVibrating = false;

    const connectBtn = document.getElementById('connect-btn');
    const logFeed = document.getElementById('log-feed');

    function checkNewDay() {
        const today = new Date().toLocaleDateString();
        if (lastDate !== today) {
            dailyCount = 0;
            lastDate = today;
            localStorage.setItem('posture_dailyCount', 0);
            localStorage.setItem('posture_lastDate', today);
        }
        document.getElementById('daily-vibe-count').textContent = dailyCount;
        document.getElementById('date-info').textContent = "Current Session: " + today;
    }
    checkNewDay();

    connectBtn.onclick = async () => {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            connectBtn.style.display = 'none';
            document.getElementById('status-text').textContent = "STATUS: ONLINE";
            document.getElementById('status-text').style.color = "#FA8072";
            readLoop();
        } catch (e) { logFeed.innerHTML += `<div>Error: ${e.message}</div>`; }
    };

    async function readLoop() {
        const decoder = new TextDecoderStream();
        port.readable.pipeTo(decoder.writable);
        reader = decoder.readable.getReader();
        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += value;
            let lines = buffer.split('\n');
            buffer = lines.pop();
            for (let line of lines) {
                let n = parseFloat(line.trim());
                if (!isNaN(n)) updateUI(Math.abs(n));
            }
        }
    }

    function updateUI(angle) {
        document.getElementById('angle-display').textContent = angle.toFixed(1);
        
        // ระบบนับจำนวนครั้ง
        if (angle >= 45 && !isVibrating) {
            dailyCount++;
            localStorage.setItem('posture_dailyCount', dailyCount);
            document.getElementById('daily-vibe-count').textContent = dailyCount;
            isVibrating = true;
        } else if (angle < 45) {
            isVibrating = false;
        }

        history.push(angle);
        if (history.length > 100) history.shift();
        drawGraph();
    }

    function drawGraph() {
        const c = document.getElementById('tilt-graph');
        const ctx = c.getContext('2d');
        c.width = c.parentElement.clientWidth - 50;
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.strokeStyle = "#EFE9AE"; 
        ctx.lineWidth = 3;
        ctx.beginPath();
        let step = c.width / 100;
        history.forEach((v, i) => {
            let x = i * step;
            let y = c.height - (v / 90 * c.height);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }
</script>
</body>
</html>
