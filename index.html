<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posture Guard Pro v4.6</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            --bg-60: #1B4332;       /* ม่วง: สีหลัก */
            --sec-30: #EFE9AE;      /* น้ำเงิน: สีรอง */
            --accent-10: #FA8072;   /* แดง: สีเน้น */
            --panel-alpha: rgba(27, 67, 50, 0.85); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Chakra Petch', sans-serif; 
            color: var(--sec-30); 
            min-height: 100vh;
            padding: 20px;

            /* ใส่ลิงก์ GIF ที่คุณส่งมา พร้อมฟิล์มดำจางๆ เพื่อให้อ่านง่ายขึ้น */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('https://i.ibb.co/Q3jqC4s1/652787613-1500795708146768-3586729385062130144-n.gif'); 

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .container { max-width: 900px; margin: 0 auto; position: relative; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--sec-30); padding-bottom: 15px; margin-bottom: 25px; 
            background: var(--panel-alpha); padding: 20px; border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        h1 { color: var(--accent-10); font-size: 1.8rem; letter-spacing: 2px; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .panel { 
            background: var(--panel-alpha);
            border: 2px solid var(--sec-30); 
            border-radius: 15px; padding: 25px; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
            backdrop-filter: blur(12px); /* เพิ่มความเบลอเพื่อให้เห็นพื้นหลังลางๆ แบบกระจกฝ้า */
        }

        .full-width { grid-column: 1 / -1; }

        .label { 
            font-size: 0.85rem; font-weight: bold; color: var(--sec-30); 
            margin-bottom: 10px; border-left: 4px solid var(--accent-10); padding-left: 10px;
            text-transform: uppercase;
        }

        #angle-display, #daily-vibe-count { 
            font-family: 'Share Tech Mono', monospace; 
            color: var(--accent-10); font-weight: bold;
        }
        
        #angle-display { font-size: 6rem; line-height: 1; }
        #daily-vibe-count { font-size: 5rem; }

        button { 
            background: rgba(250, 128, 114, 0.1); border: 2px solid var(--accent-10); 
            color: var(--accent-10); padding: 15px; border-radius: 8px;
            cursor: pointer; font-family: 'Chakra Petch'; font-weight: bold;
            transition: 0.3s; width: 100%; margin-bottom: 20px; font-size: 1.1rem;
        }
        button:hover { background: var(--accent-10); color: var(--bg-60); box-shadow: 0 0 20px var(--accent-10); }

        #log-feed { 
            background: rgba(0,0,0,0.4); border: 1px solid var(--sec-30);
            height: 100px; overflow-y: auto; padding: 10px;
            font-family: 'Share Tech Mono'; font-size: 0.75rem; color: var(--sec-30);
        }

        canvas { width: 100%; height: 150px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>POSTURE GUARD <span style="font-size: 0.8rem; color: var(--sec-30);">v4.6</span></h1>
        <div id="status-text" style="color: var(--sec-30); font-weight: bold;">STATUS: STANDBY</div>
    </header>

    <button id="connect-btn">⚡ CONNECT DEVICE</button>

    <div class="main-grid">
        <div class="panel">
            <div class="label">CURRENT TILT ANGLE</div>
            <div id="angle-display">0.0</div>
            <div style="font-size: 0.9rem; opacity: 0.7;">DEGREES (Y-AXIS)</div>
        </div>

        <div class="panel">
            <div class="label">TOTAL ALERTS TODAY</div>
            <div id="daily-vibe-count">0</div>
            <div id="date-info" style="font-size: 0.9rem; opacity: 0.7;">Session: --/--/--</div>
        </div>

        <div class="panel full-width">
            <div class="label">MOVEMENT HISTORY</div>
            <canvas id="tilt-graph"></canvas>
        </div>

        <div class="panel full-width">
            <div class="label">RAW DATA FEED</div>
            <div id="log-feed">Waiting for Arduino Data...</div>
        </div>
    </div>
</div>

<script>
    // ส่วน Logic เดิมทั้งหมดที่บันทึกสถิติและรับค่า Serial
    let port, reader, buffer = "";
    const history = [];
    let dailyCount = parseInt(localStorage.getItem('posture_dailyCount')) || 0;
    let lastDate = localStorage.getItem('posture_lastDate') || "";
    let isVibrating = false;

    const connectBtn = document.getElementById('connect-btn');
    const logFeed = document.getElementById('log-feed');

    function checkNewDay() {
        const today = new Date().toLocaleDateString();
        if (lastDate !== today) {
            dailyCount = 0;
            lastDate = today;
            localStorage.setItem('posture_dailyCount', 0);
            localStorage.setItem('posture_lastDate', today);
        }
        document.getElementById('daily-vibe-count').textContent = dailyCount;
        document.getElementById('date-info').textContent = "Current Session: " + today;
    }
    checkNewDay();

    connectBtn.onclick = async () => {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            connectBtn.style.display = 'none';
            document.getElementById('status-text').textContent = "STATUS: ONLINE";
            document.getElementById('status-text').style.color = "#FA8072";
            readLoop();
        } catch (e) { logFeed.innerHTML += `<div>Error: ${e.message}</div>`; }
    };

    async function readLoop() {
        const decoder = new TextDecoderStream();
        port.readable.pipeTo(decoder.writable);
        reader = decoder.readable.getReader();
        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += value;
            let lines = buffer.split('\n');
            buffer = lines.pop();
            for (let line of lines) {
                let n = parseFloat(line.trim());
                if (!isNaN(n)) updateUI(Math.abs(n));
            }
        }
    }

    function updateUI(angle) {
        document.getElementById('angle-display').textContent = angle.toFixed(1);
        if (angle >= 45 && !isVibrating) {
            dailyCount++;
            localStorage.setItem('posture_dailyCount', dailyCount);
            document.getElementById('daily-vibe-count').textContent = dailyCount;
            isVibrating = true;
        } else if (angle < 45) {
            isVibrating = false;
        }
        history.push(angle);
        if (history.length > 100) history.shift();
        drawGraph();
    }

    function drawGraph() {
        const c = document.getElementById('tilt-graph');
        const ctx = c.getContext('2d');
        c.width = c.parentElement.clientWidth - 50;
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.strokeStyle = "#EFE9AE"; 
        ctx.lineWidth = 3;
        ctx.beginPath();
        let step = c.width / 100;
        history.forEach((v, i) => {
            let x = i * step;
            let y = c.height - (v / 90 * c.height);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }
</script>
</body>
</html>
